<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form</title>
</head>

<body>
  <h3>
    Fill in the Application Form
  </h3>
  <form action="" method="post">

    <div>
      <label for="name">Name</label>
      <input type="text" name="name" id="name" placeholder="name in full">
    </div>

    <div>
      <label for="email">Email address</label>
      <input type="text" name="email-address" id="email" placeholder="@gmail.com">
    </div>

    <div>
      <label for="password">Login Password</label>
      <input type="password" name="login-password" id="password" placeholder="4-8 characters">
    </div>

    <br>

    <label for="login-remember">Remember me
      <input type="checkbox" name="login-remember" id="login-remember">
    </label>

    <br><br>

    <div>
      <label for="submit"></label>
      <button>Submit </button>
    </div>

  </form>
</body>

</html>

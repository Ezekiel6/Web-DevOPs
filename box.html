<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doc</title>
  <style>
    * {
      box-sizing: border-box;
    }

    .todo {
      display: flex;
      gap: 24px;
      align-items: center;
      background-color: #f5fbfa;
      border-left: 8px solid #00b29c;
      padding-top: 16px;
      padding-bottom: 16px;
      padding-left: 32px;
      padding-right: 32px;
      width: 400px;
      box-sizing: content-box;
    }

    .todo.alternative {
      box-sizing: border-box;
    }
  </style>
</head>

<body>
  <p>Today</p>
  <section class="Learning">
    <div class="todo">
      <input type="checkbox">
      <div>
        <h2>Robert fox Portfolio Website</h2>
        <p>Design the landing page</p>
      </div>
    </div>

    <br>

    <div class="todo alternative">
      <input type="checkbox">
      <div>
        <h2>Robert fox Portfolio Website</h2>
        <p>Design the landing page</p>
      </div>
    </div>

  </section>

</body>

</html>

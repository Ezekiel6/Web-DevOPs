<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscription</title>
  <link rel="stylesheet" href="form-2.html">
    <style>
      div{
        background-color: aqua;
      }
    </style>
</head>
<body>
  <p>Place Your Order</p>
  <form action="" method="post">
    <div>
      <div>
        <label for="Order-name">Name</label>
        <input type="text" name="Order-name" id="Order-name" placeholder="your full name">
      </div>  
      <div>
        <label for="order-email">Email address</label>
        <input type="text" name="order-email" id="order-email" placeholder="@gmail.com">
      </div>
    <div>
      <div>
        <label for="">Order form</label>
        <input type="text" name="order order-address-1" id="order-address-1">
        <input type="text" name="order-address-2" id="order-address-2">
      </div>
    </div>

    <div>
      <div>
        <label for="order-city">City</label>
        <input type="text" name="order-city" id="order-city">
      </div>
      <div>
        <label for="order-state">State</label>
        <select name="order-state" id="order-state">
          <option value="Kakuma">Kakuma</option>
          <option value="Nairobi">Nairobi</option>
          <option value="Lodwar">Lodwar</option>
          <option value="Kelboyei">Kelboyei</option>
          <option value="Kitale">Kitale</option>
        </select>
      </div>
      <div>
        <label for="order-zip">Zip</label>
        <input type="text" name="order-zip" id="order-zip">
      </div>
    </div>

    <div>
      <label for="order-color-sample">What colour sample should we send you?</label>
    </div>

  </form>
</body>
</html>
